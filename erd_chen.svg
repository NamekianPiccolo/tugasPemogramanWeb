  <!-- ================= RELATIONSHIP LINES (CORRECTED VERTICES) ================= -->
  
  <!-- 1. kategori (1) - mempunyai - dokumen (N) -->
  <line x1="320" y1="180" x2="440" y2="280" stroke="#222222" stroke-width="1.5" />
  <line x1="560" y1="280" x2="680" y2="380" stroke="#222222" stroke-width="1.5" />
  <text x="340" y="175" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="660" y="365" font-size="12" font-weight="bold" fill="#333333">N</text>

