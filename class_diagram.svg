<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1050" style="background: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Background Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f0f0f0" stroke-width="1" />
    </pattern>
    
    <!-- UML Association Arrow -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222222" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Title -->
  <text x="750" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#111111" letter-spacing="1">UML CLASS DIAGRAM</text>
  <text x="750" y="65" font-size="14" fill="#666666" text-anchor="middle">Sistem Manajemen Arsip Dokumen Digital (Model Layer)</text>

  <!-- ================= UML ASSOCIATION LINES ================= -->
  
  <!-- Kategori (1) - Dokumen (*) -->
  <path d="M 220 280 L 220 440 L 630 440" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="230" y="295" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="610" y="430" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Unit (1) - Dokumen (*) -->
  <path d="M 220 480 L 220 500 L 630 500" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="230" y="495" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="610" y="490" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Dokumen (1) - Revisi (*) -->
  <line x1="750" y1="570" x2="750" y2="690" stroke="#222222" stroke-width="1.5" />
  <text x="760" y="590" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="760" y="680" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Dokumen (1) - Distribusi (*) -->
  <path d="M 870 410 L 1000 410 L 1000 200 L 1160 200" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="885" y="400" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="1145" y="190" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Dokumen (1) - Izin (*) -->
  <path d="M 870 440 L 1160 440" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="885" y="430" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="1145" y="430" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Dokumen (1) - Riwayat (*) -->
  <path d="M 870 470 L 1000 470 L 1000 760 L 1160 760" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="885" y="460" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="1145" y="750" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Users (1) - Distribusi (*) / Izin (*) / Riwayat (*) (Using Bus System at X=1060) -->
  <line x1="340" y1="755" x2="1060" y2="755" stroke="#222222" stroke-width="1.5" />
  <line x1="1060" y1="230" x2="1060" y2="820" stroke="#222222" stroke-width="1.5" />
  
  <!-- Connect to Distribusi (*) -->
  <path d="M 1060 230 L 1160 230" fill="none" stroke="#222222" stroke-width="1.5" />
  <!-- Connect to Izin (*) -->
  <path d="M 1060 520 L 1160 520" fill="none" stroke="#222222" stroke-width="1.5" />
  <!-- Connect to Riwayat (*) -->
  <path d="M 1060 820 L 1160 820" fill="none" stroke="#222222" stroke-width="1.5" />
  
  <text x="355" y="745" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="1145" y="220" font-size="12" font-weight="bold" fill="#333333">*</text>
  <text x="1145" y="510" font-size="12" font-weight="bold" fill="#333333">*</text>
  <text x="1145" y="810" font-size="12" font-weight="bold" fill="#333333">*</text>

  <!-- Users (1) - Revisi (*) -->
  <path d="M 340 790 L 630 790" fill="none" stroke="#222222" stroke-width="1.5" />
  <text x="355" y="780" font-size="12" font-weight="bold" fill="#333333">1</text>
  <text x="610" y="780" font-size="12" font-weight="bold" fill="#333333">*</text>

  
  <!-- ================= UML CLASS BOXES ================= -->

  <!-- 1. Kategori (X=100, Y=150, W=240, H=130) -->
  <g transform="translate(100, 150)">
    <rect width="240" height="130" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Kategori</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ nama_kategori: string</text>
    <text x="12" y="89" font-size="11">+ created_at: datetime</text>
    <line x1="0" y1="99" x2="240" y2="99" stroke="#222222" stroke-width="1" />
    <text x="12" y="117" font-size="11" font-style="italic">+ getDokumen(): array</text>
  </g>

  <!-- 2. Unit (X=100, Y=350, W=240, H=130) -->
  <g transform="translate(100, 350)">
    <rect width="240" height="130" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Unit</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ nama_unit: string</text>
    <text x="12" y="89" font-size="11">+ created_at: datetime</text>
    <line x1="0" y1="99" x2="240" y2="99" stroke="#222222" stroke-width="1" />
    <text x="12" y="117" font-size="11" font-style="italic">+ getDokumen(): array</text>
  </g>

  <!-- 3. User (X=100, Y=650, W=240, H=210) -->
  <g transform="translate(100, 650)">
    <rect width="240" height="210" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">User</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ username: string</text>
    <text x="12" y="89" font-size="11">+ nama_lengkap: string</text>
    <text x="12" y="107" font-size="11">+ email: string</text>
    <text x="12" y="125" font-size="11">+ password: string</text>
    <text x="12" y="143" font-size="11">+ role: string</text>
    <text x="12" y="161" font-size="11">+ created_at: datetime</text>
    <line x1="0" y1="171" x2="240" y2="171" stroke="#222222" stroke-width="1" />
    <text x="12" y="189" font-size="11" font-style="italic">+ getRole(): string</text>
  </g>

  <!-- 4. Dokumen (X=630, Y=310, W=240, H=260) -->
  <g transform="translate(630, 310)">
    <rect width="240" height="260" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Dokumen</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ judul: string</text>
    <text x="12" y="89" font-size="11">+ deskripsi: text</text>
    <text x="12" y="107" font-size="11">+ tanggal: date</text>
    <text x="12" y="125" font-size="11">+ file_dokumen: string</text>
    <text x="12" y="143" font-size="11">+ kategori_id: int</text>
    <text x="12" y="161" font-size="11">+ unit_id: int</text>
    <text x="12" y="179" font-size="11">+ ukuran_file: int</text>
    <text x="12" y="197" font-size="11">+ ekstensi_file: string</text>
    <text x="12" y="215" font-size="11">+ created_at: datetime</text>
    <line x1="0" y1="225" x2="240" y2="225" stroke="#222222" stroke-width="1" />
    <text x="12" y="243" font-size="11" font-style="italic">+ getFileUrl(): string</text>
  </g>

  <!-- 5. Revisi (X=630, Y=690, W=240, H=280) -->
  <g transform="translate(630, 690)">
    <rect width="240" height="280" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Revisi</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ dokumen_id: int</text>
    <text x="12" y="89" font-size="11">+ user_id: int</text>
    <text x="12" y="107" font-size="11">+ judul: string</text>
    <text x="12" y="125" font-size="11">+ deskripsi: text</text>
    <text x="12" y="143" font-size="11">+ tanggal: date</text>
    <text x="12" y="161" font-size="11">+ kategori_id: int</text>
    <text x="12" y="179" font-size="11">+ unit_id: int</text>
    <text x="12" y="197" font-size="11">+ file_dokumen: string</text>
    <text x="12" y="215" font-size="11">+ status_revisi: enum</text>
    <text x="12" y="233" font-size="11">+ pesan_admin: text</text>
    <line x1="0" y1="243" x2="240" y2="243" stroke="#222222" stroke-width="1" />
    <text x="12" y="261" font-size="11" font-style="italic">+ approve(): bool</text>
  </g>

  <!-- 6. Distribusi (X=1160, Y=120, W=240, H=160) -->
  <g transform="translate(1160, 120)">
    <rect width="240" height="160" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Distribusi</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ dokumen_id: int</text>
    <text x="12" y="89" font-size="11">+ user_id: int</text>
    <text x="12" y="107" font-size="11">+ tanggal_pinjam: date</text>
    <text x="12" y="125" font-size="11">+ status: enum</text>
    <line x1="0" y1="133" x2="240" y2="133" stroke="#222222" stroke-width="1" />
    <text x="12" y="151" font-size="11" font-style="italic">+ returnDokumen(): bool</text>
  </g>

  <!-- 7. Izin (X=1160, Y=420, W=240, H=200) -->
  <g transform="translate(1160, 420)">
    <rect width="240" height="200" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Izin</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ user_id: int</text>
    <text x="12" y="89" font-size="11">+ dokumen_id: int</text>
    <text x="12" y="107" font-size="11">+ pesan: text</text>
    <text x="12" y="125" font-size="11">+ status_izin: enum</text>
    <text x="12" y="143" font-size="11">+ tgl_pengajuan: datetime</text>
    <line x1="0" y1="153" x2="240" y2="153" stroke="#222222" stroke-width="1" />
    <text x="12" y="171" font-size="11" font-style="italic">+ processRequest(): bool</text>
  </g>

  <!-- 8. Riwayat (X=1160, Y=720, W=240, H=160) -->
  <g transform="translate(1160, 720)">
    <rect width="240" height="160" rx="4" ry="4" fill="#ffffff" stroke="#222222" stroke-width="2" />
    <text x="120" y="25" font-size="14" font-weight="bold" text-anchor="middle">Riwayat</text>
    <line x1="0" y1="35" x2="240" y2="35" stroke="#222222" stroke-width="1.2" />
    <text x="12" y="53" font-size="11">+ id: int</text>
    <text x="12" y="71" font-size="11">+ dokumen_id: int</text>
    <text x="12" y="89" font-size="11">+ user_id: int</text>
    <text x="12" y="107" font-size="11">+ aksi: string</text>
    <text x="12" y="125" font-size="11">+ keterangan: text</text>
    <line x1="0" y1="133" x2="240" y2="133" stroke="#222222" stroke-width="1" />
    <text x="12" y="151" font-size="11" font-style="italic">+ logActivity(): bool</text>
  </g>

</svg>
